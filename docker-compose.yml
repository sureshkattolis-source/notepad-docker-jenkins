services:
  mysql:
    image: mysql:8.0
    container_name: nodevault_db
    environment:
      MYSQL_ROOT_PASSWORD: Suresh@007
      MYSQL_DATABASE: notepad_db
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  backend:
    build: ./backend        # ← build from Dockerfile
    container_name: nodevault_backend
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: Suresh@007
      DB_NAME: notepad_db
    expose:
      - "5000"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend       # ← build from Dockerfile
    container_name: nodevault_frontend
    expose:
      - "80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: nodevault_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  mysql_data: